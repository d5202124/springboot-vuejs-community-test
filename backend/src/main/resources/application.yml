server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/esun_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    # 啟動前請設定環境變數：export DB_PASSWORD=your_password（Mac/Linux）或 $env:DB_PASSWORD="your_password"（Windows）
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

jwt:
  # 啟動前請設定環境變數：export JWT_SECRET=your_secret（至少 64 字元）
  secret: ${JWT_SECRET}
  expiration-ms: 86400000
